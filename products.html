<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TryFit - Products</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<header>
    <h1>TryFit Products</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
    </nav>
</header>

<main>
    <section class="product-section">
        <div class="controls card">
            <input id="search" placeholder="Search products...">
            <button onclick="searchProducts()">Search</button>
        </div>

        <div class="products container">
            <div class="product card">
                <img src="https://images.unsplash.com/photo-1520975928318-8b3d7c5b3a7e" alt="T-Shirt">
                <p>T-Shirt</p>
                <button onclick="addToCart('T-Shirt', 20)">Add to Cart</button>
            </div>
            <div class="product card">
                <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="Dress">
                <p>Dress</p>
                <button onclick="addToCart('Dress', 40)">Add to Cart</button>
            </div>
            <div class="product card">
                <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d" alt="Hoodie">
                <p>Hoodie</p>
                <button onclick="addToCart('Hoodie', 35)">Add to Cart</button>
            </div>
        </div>
    </section>
</main>

<footer>
    © 2026 TryFit | All Rights Reserved
</footer>

</body>
</html>
